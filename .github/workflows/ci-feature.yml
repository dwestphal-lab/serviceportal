name: CI → Feature / Fix Branch

# ============================================================
# Läuft bei jedem PR auf develop oder main.
# Blockiert den Merge wenn TypeScript-Check fehlschlägt.
# ============================================================

on:
  pull_request:
    branches:
      - develop
      - main

jobs:
  ci:
    name: TypeScript & Build-Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: pnpm installieren
        uses: pnpm/action-setup@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Abhängigkeiten installieren
        run: pnpm install --frozen-lockfile

      - name: TypeScript prüfen (Frontend)
        run: pnpm --filter frontend tsc --noEmit

      - name: TypeScript prüfen (Backend)
        run: pnpm --filter backend tsc --noEmit

      - name: CI-Ergebnis
        if: success()
        run: echo "✓ TypeScript-Check bestanden — PR kann gemergt werden"
