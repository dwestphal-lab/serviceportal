name: CI → Release-PR (develop → main)

# ============================================================
# Läuft nur bei PRs auf main (Release-Freigabe).
# Feature/Fix-Branches werden automatisch per auto-merge-develop.yml
# in develop gemergt — kein manueller PR nötig.
# ============================================================

on:
  pull_request:
    branches:
      - main

jobs:
  ci:
    name: TypeScript & Build-Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: pnpm installieren
        uses: pnpm/action-setup@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Abhängigkeiten installieren
        run: pnpm install --frozen-lockfile

      - name: TypeScript prüfen (Frontend)
        run: pnpm --filter frontend tsc --noEmit

      - name: TypeScript prüfen (Backend)
        run: pnpm --filter backend tsc --noEmit

      - name: CI-Ergebnis
        if: success()
        run: echo "✓ TypeScript-Check bestanden — PR kann gemergt werden"
