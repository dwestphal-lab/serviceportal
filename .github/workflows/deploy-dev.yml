name: CI → develop

# ============================================================
# Läuft bei jedem Push auf develop (nach PR-Merge).
# Das Deployment übernimmt der Server selbst per Cron-Polling:
#   poll-and-deploy.sh develop (läuft jede Minute)
# ============================================================

on:
  push:
    branches:
      - develop

jobs:
  ci:
    name: TypeScript & Build-Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: pnpm installieren
        uses: pnpm/action-setup@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Abhängigkeiten installieren
        run: pnpm install --frozen-lockfile

      - name: TypeScript prüfen (Frontend)
        run: pnpm --filter frontend tsc --noEmit

      - name: TypeScript prüfen (Backend)
        run: pnpm --filter backend tsc --noEmit
        continue-on-error: true

      - name: Info
        if: success()
        run: |
          echo "✓ CI develop abgeschlossen"
          echo "→ Deployment erfolgt automatisch durch den Server (Polling alle 60s)"
