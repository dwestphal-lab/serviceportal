name: CI → main (Produktion)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  ci:
    name: TypeScript & Build-Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: pnpm installieren
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Abhängigkeiten installieren
        run: pnpm install --frozen-lockfile

      - name: TypeScript prüfen
        run: pnpm --filter frontend tsc --noEmit

      - name: Info
        if: success()
        run: |
          echo "✓ CI Produktion abgeschlossen"
          echo "→ Deployment erfolgt automatisch durch den Server (Polling alle 60s)"
