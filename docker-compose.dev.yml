# ============================================================
# PLENIUM — Docker Compose DEV Umgebungen
# ============================================================
# Jede Umgebung läuft auf einem eigenen Port:
#   plenium-westphal → NGINX_PORT=8081
#   plenium-asmussen  → NGINX_PORT=8082
#   plenium-dev      → NGINX_PORT=8083
#
# Steuerung über Umgebungsvariablen (ENV-Datei):
#   PROJECT_NAME — Container-Präfix und Volume-Name
#   NGINX_PORT   — Externer Port
#
# Wird über scripts/deploy.sh aufgerufen.
# ============================================================

services:
  nginx:
    image: nginx:1.27-alpine
    container_name: ${PROJECT_NAME}-nginx
    ports:
      - "${NGINX_PORT}:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - plenium-net

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: ${PROJECT_NAME}-frontend
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - plenium-net

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: ${PROJECT_NAME}-backend
    expose:
      - "3001"
    environment:
      NODE_ENV: production
      PORT: "3001"
      HOST: "0.0.0.0"
      DATABASE_URL: ${DATABASE_URL}
      CORS_ORIGIN: ${CORS_ORIGIN}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - plenium-net

  postgres:
    image: postgres:17-alpine
    container_name: ${PROJECT_NAME}-postgres
    expose:
      - "5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - plenium-net

volumes:
  postgres_data:
    driver: local
    name: ${PROJECT_NAME}_postgres

networks:
  plenium-net:
    driver: bridge
    name: ${PROJECT_NAME}_network
