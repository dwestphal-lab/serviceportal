# ============================================================
# PLENIUM — Docker Compose Produktion
# ============================================================
# Läuft auf Port 80 (intern).
# Kein externer Zugriff von außen nötig.
#
# Wird über scripts/deploy.sh aufgerufen.
# ============================================================

services:
  nginx:
    image: nginx:1.27-alpine
    container_name: plenium-prod-nginx
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - plenium-net

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: plenium-prod-frontend
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - plenium-net

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: plenium-prod-backend
    expose:
      - "3001"
    environment:
      NODE_ENV: production
      PORT: "3001"
      HOST: "0.0.0.0"
      DATABASE_URL: ${DATABASE_URL}
      CORS_ORIGIN: ${CORS_ORIGIN}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - plenium-net

  postgres:
    image: postgres:17-alpine
    container_name: plenium-prod-postgres
    expose:
      - "5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - plenium-net

volumes:
  postgres_prod_data:
    driver: local
    name: plenium_prod_postgres

networks:
  plenium-net:
    driver: bridge
    name: plenium_prod_network
