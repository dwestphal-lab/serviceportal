# ============================================================
# PLENIUM — Docker Compose (Lokale Entwicklung)
# Startet nur die Datenbank — Frontend/Backend laufen lokal.
# ============================================================
# Verwendung:
#   docker compose up -d          → Datenbank starten
#   docker compose down           → Datenbank stoppen
#   docker compose down -v        → Datenbank + Daten löschen (!)
# ============================================================

services:
  postgres:
    image: postgres:17-alpine
    container_name: plenium-db-dev
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB:       ${POSTGRES_DB:-plenium}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-plenium}"]
      interval: 10s
      timeout:  5s
      retries:  5
      start_period: 10s
    restart: unless-stopped

volumes:
  postgres_dev_data:
    driver: local
    name: plenium_postgres_dev
