# ============================================================
# PLENIUM — NGINX Reverse Proxy Konfiguration
# ============================================================
# Routing:
#   /api/*    → Backend  (Fastify :3001)
#   /health   → Backend  (Health-Check für Monitoring)
#   /*        → Frontend (Next.js :3000)
# ============================================================

upstream frontend {
    server frontend:3000;
    keepalive 32;
}

upstream backend {
    server backend:3001;
    keepalive 32;
}

# Rate Limiting Zones
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=general_limit:10m rate=60r/s;

server {
    listen 80;
    server_name _;

    # ── Security Headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options              "SAMEORIGIN"                                    always;
    add_header X-Content-Type-Options       "nosniff"                                       always;
    add_header X-XSS-Protection             "1; mode=block"                                 always;
    add_header Referrer-Policy              "strict-origin-when-cross-origin"               always;
    add_header Permissions-Policy           "camera=(), microphone=(), geolocation=()"      always;
    add_header Content-Security-Policy      "default-src 'self'; script-src 'self' 'unsafe-eval' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:;" always;

    # ── Logging ───────────────────────────────────────────────────────────────
    access_log /var/log/nginx/plenium_access.log;
    error_log  /var/log/nginx/plenium_error.log;

    # ── API Routes → Backend ──────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass          http://backend;
        proxy_http_version  1.1;
        proxy_set_header    Host                $host;
        proxy_set_header    X-Real-IP           $remote_addr;
        proxy_set_header    X-Forwarded-For     $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto   $scheme;
        proxy_set_header    Connection          "";
        proxy_read_timeout  60s;
        proxy_send_timeout  60s;

        # CORS wird im Backend (Fastify) gesetzt — hier nicht doppeln
    }

    # ── Health Check → Backend ────────────────────────────────────────────────
    location = /health {
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        access_log         off;
    }

    # ── Frontend → Next.js ────────────────────────────────────────────────────
    location / {
        limit_req zone=general_limit burst=30 nodelay;

        proxy_pass          http://frontend;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade             $http_upgrade;
        proxy_set_header    Connection          "upgrade";
        proxy_set_header    Host                $host;
        proxy_set_header    X-Real-IP           $remote_addr;
        proxy_set_header    X-Forwarded-For     $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto   $scheme;
        proxy_cache_bypass  $http_upgrade;
        proxy_read_timeout  60s;
    }

    # ── Statische Next.js Assets (mit Caching) ────────────────────────────────
    location /_next/static/ {
        proxy_pass          http://frontend;
        proxy_http_version  1.1;
        proxy_set_header    Host $host;
        expires             1y;
        add_header          Cache-Control "public, immutable";
        access_log          off;
    }

    # ── Gzip Compression ─────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_types
        text/plain text/css text/xml application/json
        application/javascript application/xml+rss
        application/atom+xml image/svg+xml;
}
